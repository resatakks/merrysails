name: GSC Daily Snapshot

on:
  schedule:
    # Her sabah 07:10 UTC (10:10 Istanbul) — Vercel cron'dan 10 dk sonra
    - cron: "10 7 * * *"
  # Manuel tetikleme için
  workflow_dispatch:
    inputs:
      date:
        description: "Override date (YYYY-MM-DD, default: 3 days ago)"
        required: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run GSC snapshot
        env:
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          GSC_SITE_URL: "sc-domain:merrysails.com"
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/gsc-daily-snapshot.mjs --date "${{ github.event.inputs.date }}"
          else
            node scripts/gsc-daily-snapshot.mjs
          fi

      - name: Commit snapshot file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gsc/
          # Sadece değişiklik varsa commit at
          if git diff --staged --quiet; then
            echo "No new GSC data to commit (already up to date)"
          else
            git commit -m "chore(gsc): daily snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
